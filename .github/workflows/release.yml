name: Build Windows release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install full requirements
        run: python -m pip install -r requirements.txt

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build packaged app
        run: |
          pyinstaller --noconfirm --windowed `
            --name "Portable Learning Environment" `
            --icon assets/ico.ico `
            --version-file scripts/version_info.txt `
            --paths src `
            --add-data "assets;assets" `
            --add-data "docs;docs" `
            --add-data "src/ple/views/theme/light.qss;ple/views/theme" `
            --add-data "src/ple/views/theme/dark.qss;ple/views/theme" `
            --collect-submodules ple `
            main.py

      - name: Stage release artefacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $version = "${{ github.ref_name }}"
          if (-not $version) { $version = "dev" }
          $zipName = "PortableLearningEnvironment-$version-windows.zip"
          Compress-Archive -Path "dist/Portable Learning Environment/*" `
            -DestinationPath "release/$zipName"
          Write-Host "Built $zipName"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: PortableLearningEnvironment-windows
          path: release/*.zip
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
